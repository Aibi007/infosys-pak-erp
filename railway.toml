[build]
  builder = "NIXPACKS"
  buildCommand = "npm install --prefix backend"

[deploy]
  startCommand = "cd backend && npm run migrate && npm start"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[env]
  NODE_ENV = "production"
  JWT_SECRET = "a-secure-secret-for-production"
  BCRYPT_ROUNDS = "12"
  JWT_ACCESS_EXPIRES = "900"
